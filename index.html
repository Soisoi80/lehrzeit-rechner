<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Lehrzeit Rechner</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 600px;
  margin: auto;
  padding: 20px;
}
label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}
input {
  width: 100%;
  padding: 6px;
  margin-top: 4px;
}
button {
  margin-top: 20px;
  padding: 10px;
  width: 100%;
}
.result {
  margin-top: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Lehrzeit‑Rechner</h2>

<label>Lehrbeginn (TT.MM.JJJJ)</label>
<input id="startDate" placeholder="z. B. 01.05.2026">

<h3>Vorlehrzeit</h3>

<label>Von (TT.MM.JJJJ)</label>
<input id="v1" placeholder="z. B. 01.08.2023">

<label>Bis (TT.MM.JJJJ)</label>
<input id="b1" placeholder="z. B. 25.09.2023">

<button onclick="calculate()">Berechnen</button>

<div id="result" class="result"></div>

<script>
function parseDate(str) {
  const parts = str.split(".");
  if (parts.length !== 3) throw "Datum bitte als TT.MM.JJJJ eingeben.";
  return new Date(parts[2], parts[1]-1, parts[0]);
}

function formatDate(d) {
  return ("0"+d.getDate()).slice(-2) + "." +
         ("0"+(d.getMonth()+1)).slice(-2) + "." +
         d.getFullYear();
}

function calculate() {
  try {
    const startDate = parseDate(document.getElementById("startDate").value);
    const von = parseDate(document.getElementById("v1").value);
    const bis = parseDate(document.getElementById("b1").value);

    if (bis < von) throw "Bis‑Datum liegt vor Von‑Datum.";
    if (von >= startDate) throw "Vorlehrzeit liegt nach Lehrbeginn.";

    const days = Math.floor((bis - von) / (1000*60*60*24));

    const thirdYear = new Date(startDate);
    thirdYear.setFullYear(thirdYear.getFullYear() + 2);
    thirdYear.setDate(thirdYear.getDate() - days);

    const endDate = new Date(startDate);
    endDate.setFullYear(endDate.getFullYear() + 4);
    endDate.setDate(endDate.getDate() - 1);
    endDate.setDate(endDate.getDate() - days);

    document.getElementById("result").innerHTML =
      "Eintritt 3. Lehrjahr: " + formatDate(thirdYear) + "<br>" +
      "Lehrzeitende: " + formatDate(endDate);

  } catch (e) {
    alert(e);
  }
}
</script>

</body>
</html>
