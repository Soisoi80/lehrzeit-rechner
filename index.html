<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Lehrzeit Rechner</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  max-width: 700px;
  margin: auto;
}
label {
  font-weight: bold;
}
input {
  width: 100%;
  padding: 6px;
  margin-bottom: 8px;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}
th, td {
  padding: 6px;
  border-bottom: 1px solid #ccc;
}
button {
  margin-top: 15px;
  width: 100%;
  padding: 10px;
}
.result {
  margin-top: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Berechnung Lehrzeit – verlängerte Lehre</h2>

<label>Lehrbeginn</label>
<input type="date" id="startDate">

<h3>Vorlehrzeiten</h3>

<table>
<thead>
<tr>
  <th>Betrieb</th>
  <th>Von</th>
  <th>Bis</th>
</tr>
</thead>
<tbody>
<tr>
  <td><input type="text"></td>
  <td><input type="date"></td>
  <td><input type="date"></td>
</tr>
<tr>
  <td><input type="text"></td>
  <td><input type="date"></td>
  <td><input type="date"></td>
</tr>
<tr>
  <td><input type="text"></td>
  <td><input type="date"></td>
  <td><input type="date"></td>
</tr>
</tbody>
</table>

<button onclick="calculate()">Berechnen</button>

<div id="result" class="result"></div>

<script>
function formatDate(d) {
  return ("0"+d.getDate()).slice(-2) + "." +
         ("0"+(d.getMonth()+1)).slice(-2) + "." +
         d.getFullYear();
}

function calculate() {
  try {
    const startVal = document.getElementById("startDate").value;
    if (!startVal) throw "Lehrbeginn fehlt.";

    const startDate = new Date(startVal + "T00:00:00");

    let totalDays = 0;
    const rows = document.querySelectorAll("tbody tr");

    rows.forEach(row => {
      const von = row.cells[1].children[0].value;
      const bis = row.cells[2].children[0].value;

      if (!von || !bis) return;

      const v = new Date(von + "T00:00:00");
      const b = new Date(bis + "T00:00:00");

      if (b < v) throw "Bis-Datum liegt vor Von-Datum.";
      if (v >= startDate) throw "Vorlehrzeit liegt nach Lehrbeginn.";

     totalDays += Math.floor((b - v) / (1000*60*60*24));

    });

  // Eintritt 3. Lehrjahr – erster Tag
const thirdYear = new Date(startDate);
thirdYear.setFullYear(thirdYear.getFullYear() + 2);
thirdYear.setDate(thirdYear.getDate() - totalDays - 1);

// Lehrzeitende – letzter Tag
const endDate = new Date(startDate);
endDate.setFullYear(endDate.getFullYear() + 4);
endDate.setDate(endDate.getDate() - 1);
endDate.setDate(endDate.getDate() - totalDays - 1);

    document.getElementById("result").innerHTML =
      "Eintritt 3. Lehrjahr: " + formatDate(thirdYear) + "<br>" +
      "Lehrzeitende: " + formatDate(endDate);

  } catch(e) {
    alert(e);
  }
}
</script>

</body>
</html>
