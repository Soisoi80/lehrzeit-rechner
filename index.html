<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Lehrzeit-Rechner</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

input {
  width: 100%;
  padding: 6px;
  margin-top: 4px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 20px;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  font-weight: bold;
  font-size: 16px;
}
</style>
</head>

<body>

<h2>Lehrzeit‑Rechner</h2>

<label>Lehrbeginn</label>
<input type="date" id="startDate">

<h3>Vorlehrzeit 1</h3>
<label>Von</label>
<input type="date" id="v1">
<label>Bis</label>
<input type="date" id="b1">

<h3>Vorlehrzeit 2</h3>
<label>Von</label>
<input type="date" id="v2">
<label>Bis</label>
<input type="date" id="b2">

<h3>Vorlehrzeit 3</h3>
<label>Von</label>
<input type="date" id="v3">
<label>Bis</label>
<input type="date" id="b3">

<button onclick="calculate()">Berechnen</button>

<div class="result" id="result"></div>

<script>
function formatDate(d) {
  return ("0"+d.getDate()).slice(-2) + "." +
         ("0"+(d.getMonth()+1)).slice(-2) + "." +
         d.getFullYear();
}

function calculate() {
  try {
    const startVal = document.getElementById("startDate").value;
    if (!startVal) throw "Bitte Lehrbeginn eingeben.";

    const startDate = new Date(startVal + "T00:00:00");

    const pairs = [
      ["v1","b1"],
      ["v2","b2"],
      ["v3","b3"]
    ];

    let totalDays = 0;

    pairs.forEach(p => {
      const v = document.getElementById(p[0]).value;
      const b = document.getElementById(p[1]).value;

      if (!v || !b) return;

      const von = new Date(v + "T00:00:00");
      const bis = new Date(b + "T00:00:00");

      if (bis < von) throw "Bis‑Datum liegt vor Von‑Datum.";
      if (von >= startDate) throw "Vorlehrzeit liegt nach Lehrbeginn.";

      totalDays += Math.floor((bis - von) / (1000*60*60*24));
    });

    // Eintritt 3. Lehrjahr (erster Tag)
    const thirdYear = new Date(startDate);
    thirdYear.setFullYear(thirdYear.getFullYear() + 2);
    thirdYear.setDate(thirdYear.getDate() - totalDays);

    // Lehrzeitende (letzter Tag)
    const endDate = new Date(startDate);
    endDate.setFullYear(endDate.getFullYear() + 4);
    endDate.setDate(endDate.getDate() - 1);
    endDate.setDate(endDate.getDate() - totalDays);
